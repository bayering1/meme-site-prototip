<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meme Editor Prototype</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 15px;
      background: #181818;
      display: flex;
      justify-content: center;
      font-size: 18px;
      font-weight: bold;
    }

    .controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #3ea6ff;
      color: black;
      font-weight: bold;
    }

    .stage {
      margin-top: 20px;
      width: 90%;
      max-width: 700px;
      height: 450px;
      background: black;
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      border: 2px solid #333;
    }

    .bg {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .pin-wrapper {
      position: absolute;
      touch-action: none;
      user-select: none;
    }

    .pin {
      width: 120px;
      display: block;
      pointer-events: none; /* FIX: drag now works when clicking image */
    }

    .handle {
      width: 14px;
      height: 14px;
      background: #3ea6ff;
      position: absolute;
      right: -7px;
      bottom: -7px;
      border-radius: 50%;
      touch-action: none;
      cursor: se-resize;
    }
  </style>
</head>
<body>

<header>Meme Editor Prototype</header>

<div class="controls">
  <input type="file" id="bgUpload" accept="image/*" hidden />
  <button onclick="document.getElementById('bgUpload').click()">Arka Plan</button>

  <input type="file" id="pinUpload" accept="image/*" hidden />
  <button onclick="document.getElementById('pinUpload').click()">Pin Ekle</button>

  <button onclick="downloadImage()">İndir</button>
</div>

<div class="stage" id="stage"></div>

<script>
const stage = document.getElementById('stage');

// BACKGROUND
const bgInput = document.getElementById('bgUpload');
bgInput.addEventListener('change', e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = ev => {
    let img = document.querySelector('.bg');
    if (!img) {
      img = document.createElement('img');
      img.classList.add('bg');
      stage.appendChild(img);
    }
    img.src = ev.target.result;
  };

  reader.readAsDataURL(file);
});

// PIN
const pinInput = document.getElementById('pinUpload');
pinInput.addEventListener('change', e => {
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = ev => {
    const wrapper = document.createElement('div');
    wrapper.className = 'pin-wrapper';
    wrapper.style.left = '50px';
    wrapper.style.top = '50px';

    const img = document.createElement('img');
    img.src = ev.target.result;
    img.className = 'pin';

    const handle = document.createElement('div');
    handle.className = 'handle';

    wrapper.appendChild(img);
    wrapper.appendChild(handle);
    stage.appendChild(wrapper);

    makeDrag(wrapper);
    makeResize(wrapper, handle);
  };

  reader.readAsDataURL(file);
});

// DRAG FIX (now works because image doesn't block events)
function makeDrag(el) {
  let isDown = false;
  let offsetX = 0;
  let offsetY = 0;

  el.addEventListener('mousedown', e => {
    if (e.target.classList.contains('handle')) return;
    isDown = true;

    const rect = el.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
  });

  el.addEventListener('touchstart', e => {
    if (e.target.classList.contains('handle')) return;
    const t = e.touches[0];
    isDown = true;

    const rect = el.getBoundingClientRect();
    offsetX = t.clientX - rect.left;
    offsetY = t.clientY - rect.top;
  });

  document.addEventListener('mousemove', e => {
    if (!isDown) return;
    move(e.clientX, e.clientY);
  });

  document.addEventListener('touchmove', e => {
    if (!isDown) return;
    const t = e.touches[0];
    move(t.clientX, t.clientY);
  });

  function move(x, y) {
    const rect = stage.getBoundingClientRect();
    el.style.left = (x - rect.left - offsetX) + 'px';
    el.style.top = (y - rect.top - offsetY) + 'px';
  }

  document.addEventListener('mouseup', () => isDown = false);
  document.addEventListener('touchend', () => isDown = false);
}

// RESIZE
function makeResize(wrapper, handle) {
  let resizing = false;

  handle.addEventListener('mousedown', e => {
    e.stopPropagation();
    resizing = true;
  });

  handle.addEventListener('touchstart', e => {
    e.stopPropagation();
    resizing = true;
  });

  document.addEventListener('mousemove', e => {
    if (!resizing) return;
    resize(e.clientX);
  });

  document.addEventListener('touchmove', e => {
    if (!resizing) return;
    resize(e.touches[0].clientX);
  });

  function resize(x) {
    const rect = wrapper.getBoundingClientRect();
    const newSize = Math.max(50, x - rect.left);
    wrapper.querySelector('.pin').style.width = newSize + 'px';
  }

  document.addEventListener('mouseup', () => resizing = false);
  document.addEventListener('touchend', () => resizing = false);
}

// DOWNLOAD
function downloadImage() {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');

  const rect = stage.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;

  const bg = document.querySelector('.bg');
  if (bg) ctx.drawImage(bg, 0, 0, canvas.width, canvas.height);

  document.querySelectorAll('.pin-wrapper').forEach(w => {
    const img = w.querySelector('img');
    const r = w.getBoundingClientRect();

    const x = r.left - rect.left;
    const y = r.top - rect.top;

    const width = img.getBoundingClientRect().width;

    ctx.drawImage(img, x, y, width, width);
  });

  const a = document.createElement('a');
  a.download = 'meme.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
</script>

</body>
</html>
